<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Golfjakten</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="meny" >
    <h1>GOLFJAKTEN</h1>
    <nav>
      <a href="index.html">Golfbanor</a>
      <a href="Golfresor.html">Golfresor</a>
      <a href="om.html">Om oss</a>
      <a href="kontakt.html">Kontakt</a>
      <a href="boka.html" class="btn">Boka</a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <div>
        <h2>Boka din golfresa</h2>
        <p class="section-p">Boka den perfekta golfresan i Småland och pa öland.</p> 
         <p class="btn-1">Boka golfresa</p>
      </div>
      
    </section>

    <section class="steps">
      <div>Resan</div>
      <div>Banor</div>
      <div>Boende</div>
      <div>Tillval</div>
      <div>Oversikt</div>
    </section>

    <section class="booking">
    
        <section class="form">
    
            <div class="form-item">
                <label>Område</label>
                <select>
                    <option>Välj område</option>
                    <option>Småland</option>
                    <option>Öland</option>
                </select>
            </div>
        
            <div class="form-item">
                <label>Datum</label>
                <input type="date">
            </div>
        
            <div class="form-item">
                <label>Antal spelare</label>
                <select>
                    <option>1 person</option>
                    <option>2 personer</option>
                    <option>3 personer</option>
                    <option>4 personer</option>
                </select>
            </div>
        
            <div class="form-btn">
                <button>SÖK GOLFBANOR →</button>
            </div>
        
        </section>
  </main>

  <footer>GOLFJAKTEN</footer>
</body>
</html>
